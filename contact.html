<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Rebecca Decker</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <a href="index.html" class="logo">
      <img src="images/logo.jpg" alt="Rebecca Decker logo"> Rebecca Decker
    </a>

    <!-- Hamburger toggle -->
    <input type="checkbox" id="nav-toggle" class="nav-toggle">
    <label for="nav-toggle" class="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </label>

    <!-- NAVIGATION -->
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="resume.html">Resume</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- MAIN CONTENT -->
 <main class="contact-page">
  <div class="contact-grid">
    
    <!-- IMAGE LEFT -->
    <div class="contact-image">
      <img src="images/contact.jpg" alt="Contact illustration">
    </div>
    
    <!-- FORM RIGHT -->
    <div class="contact-form-container">
      <h1>Contact Me</h1>
      <p>Have a question or want to work together? Send me a message!</p>
      <form class="contact-form">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit">Send Message</button>
      </form>
    </div>

  </div>
</main>

  <!-- MESSAGE SENT POPUP -->
  <div id="message-popup" class="message-popup hidden">
    <p>✅ Message sent! Thank you for reaching out.</p>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <a href="https://linkedin.com" target="_blank">LinkedIn</a>
    <a href="https://github.com" target="_blank">GitHub</a>
    <p>© 2026 Rebecca Decker</p>
  </footer>

  <!-- SCRIPT -->
  <script src="js/script.js"></script>
</body>
</html>
